    <style>
        /* CAROUSEL */

        .carousel {
            flex: 1;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none
        }

        .carousel::-webkit-scrollbar {
            display: none
        }

        .mode-slide {
            flex: 0 0 100%;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 24px calc(var(--safe-b) + 100px);
            overflow-y: auto;
            scrollbar-width: none
        }

        .mode-slide::-webkit-scrollbar {
            display: none
        }

        .mode-hero {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 24px;
            animation: hex-float 3s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(0, 0, 0, .2)
        }

        .mode-name {
            font-family: var(--font-d);
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 6px
        }

        .mode-tag {
            font-size: 14px;
            color: var(--text-3);
            margin-bottom: 28px;
            text-align: center
        }

        .mode-section {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 10px;
            width: 100%;
            text-align: left
        }

        .prompt-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px
        }

        .prompt-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            font-size: 13px;
            color: var(--text-2);
            transition: all .15s;
            min-height: 48px
        }

        .prompt-item:hover {
            border-color: var(--glass-border-hover);
            color: var(--text-1)
        }

        .prompt-item:active {
            transform: scale(.98)
        }

        .prompt-item__icon {
            font-size: 16px
        }

        .sample-resp {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 18px;
            margin-bottom: 24px
        }

        .sample-resp__label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-3);
            margin-bottom: 8px;
            text-transform: uppercase
        }

        .sample-resp__text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-2);
            font-style: italic
        }

        .mode-activate {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .2);
            min-height: 52px;
            transition: transform .15s
        }

        .mode-activate:active {
            transform: scale(.97)
        }

        .mode-activate--active {
            box-shadow: 0 0 20px rgba(0, 0, 0, .3)
        }

        /* DOTS */

        .dots {
            position: fixed;
            bottom: calc(var(--safe-b) + 74px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--glass-border);
            transition: all .3s var(--spring)
        }

        .dot--active {
            background: var(--gold);
            width: 20px;
            border-radius: 4px
        }

        /* NAV */

    </style>
</head>

<body>
    <div class="ambient" aria-hidden="true">
        <div class="ambient__orb ambient__o1"></div>
        <div class="ambient__orb ambient__o2"></div>
        <div class="ambient__grain"></div>
    </div>
    <div class="app">
        <header class="hdr">
            <button class="hdr__back" onclick="history.back()" aria-label="Go back"><svg viewBox="0 0 24 24">
                    <path d="M15 18l-6-6 6-6" />
                </svg></button>
            <h1 class="hdr__title">Choose Your Mode</h1>
        </header>
        <div class="carousel" id="carousel" role="region" aria-label="AI Mode Selection Carousel"></div>
        <div class="dots" id="dots"></div>

        <nav class="nav">
            <a class="nav__item" href="02-chat-interface.html"><svg class="nav__icon" viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
                </svg><span class="nav__label">Chat</span></a>
            <a class="nav__item" href="06-history.html"><svg class="nav__icon" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg><span class="nav__label">History</span></a>
            <a class="nav__item nav__item--active" href="07-mode-selector.html"><svg class="nav__icon"
                    viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg><span class="nav__label">Modes</span></a>
            <a class="nav__item" href="04-settings.html"><svg class="nav__icon" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.6.85 1 1.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />
                </svg><span class="nav__label">Settings</span></a>
        </nav>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
    <script>
        (function () {
            'use strict';
            const MODES = [
                { key: 'friendly', icon: '😊', name: 'Friendly', tag: 'Your fun, warm best friend who always has your back', color: '#E6A520', bg: 'rgba(230,165,32,.15)', prompts: ['Tell me something fun!', 'Motivate me today', 'What should I watch tonight?'], sample: 'Hey! 😊 Oh, you NEED to watch "Everything Everywhere All At Once" — it\'s mind-blowing! It\'s funny, emotional, and has the most creative action scenes ever. Grab some popcorn!' },
                { key: 'professional', icon: '💼', name: 'Professional', tag: 'Sharp, precise, executive-level responses', color: '#4A9EFF', bg: 'rgba(74,158,255,.15)', prompts: ['Draft a client email', 'Summarize this report', 'SWOT analysis framework'], sample: 'Subject: Q4 Strategy Review\n\nDear Team,\n\nI\'ve analyzed the performance metrics and identified three key areas for optimization. Below is a structured action plan with timeline and KPIs...' },
                { key: 'coder', icon: '💻', name: 'Coder', tag: 'Your senior full-stack engineering partner', color: '#00FF88', bg: 'rgba(0,255,136,.15)', prompts: ['Build a React component', 'Debug this function', 'Database schema design'], sample: '// Optimized React hook with memoization\nconst useDebounce = (value, delay) => {\n  const [debounced, setDebounced] = useState(value);\n  useEffect(() => {\n    const timer = setTimeout(() => setDebounced(value), delay);\n    return () => clearTimeout(timer);\n  }, [value, delay]);\n  return debounced;\n};' },
                { key: 'story', icon: '📖', name: 'Story Teller', tag: 'Master of epic tales with unexpected twists', color: '#FF6B9D', bg: 'rgba(255,107,157,.15)', prompts: ['Write a sci-fi opening', 'Create a villain backstory', 'Mystery plot twist'], sample: 'The last transmission from Mars Colony 7 wasn\'t a distress signal. It was a warning. Dr. Elena Voss stared at the decoded message, her coffee growing cold: "They\'re already here. They\'ve been here all along."' },
                { key: 'roast', icon: '🔥', name: 'Roast', tag: 'Savage but loveable — comedy with a helpful twist', color: '#FF4444', bg: 'rgba(255,68,68,.15)', prompts: ['Roast my resume', 'Roast my cooking', 'Roast my code'], sample: 'Your code has more nested if-statements than a Russian doll factory 🪆 But seriously, here\'s a clean refactor using early returns and guard clauses...' },
                { key: 'teacher', icon: '🎓', name: 'Teacher', tag: 'World\'s best explainer using the Feynman technique', color: '#A78BFA', bg: 'rgba(167,139,250,.15)', prompts: ['Explain quantum computing', 'How does blockchain work?', 'Teach me algorithms'], sample: 'Think of quantum computing like having a magical library 📚\n\nRegular computer: reads one book at a time\nQuantum computer: reads ALL books simultaneously\n\nThe "magic" is called superposition. Want me to go deeper?' }
            ];
            const currentMode = PTX.get('mode', 'friendly');
            const carousel = document.getElementById('carousel'), dots = document.getElementById('dots'), toast = document.getElementById('toast');

            MODES.forEach((m, i) => {
                const active = m.key === currentMode;
                const slide = document.createElement('div'); slide.className = 'mode-slide';
                slide.innerHTML = `
    <div class="mode-hero" style="background:${m.bg}">${m.icon}</div>
    <div class="mode-name" style="color:${m.color}">${m.name}</div>
    <div class="mode-tag">${m.tag}</div>
    <div class="mode-section">Try These Prompts</div>
    <div class="prompt-list">${m.prompts.map(p => `<button class="prompt-item" data-text="${p}"><span class="prompt-item__icon">✦</span>${p}</button>`).join('')}</div>
    <div class="sample-resp"><div class="sample-resp__label">Sample Response</div><div class="sample-resp__text">${m.sample.replace(/\n/g, '<br>')}</div></div>
    <button class="mode-activate${active ? ' mode-activate--active' : ''}" style="background:${active ? m.color : m.bg};color:${active ? '#1A1108' : m.color}">${active ? '✦ Currently Active' : 'Activate This Mode'}</button>`;
                slide.querySelector('.mode-activate').addEventListener('click', () => {
                    PTX.set('mode', m.key);
                    document.querySelectorAll('.mode-activate').forEach(b => { b.textContent = 'Activate This Mode'; b.classList.remove('mode-activate--active'); });
                    const btn = slide.querySelector('.mode-activate'); btn.textContent = '✦ Currently Active'; btn.classList.add('mode-activate--active'); btn.style.background = m.color; btn.style.color = '#1A1108';
                    PTX.showToast(m.icon + ' ' + m.name + ' mode activated!');
                });
                slide.querySelectorAll('.prompt-item').forEach(p => { p.addEventListener('click', () => { PTX.set('mode', m.key); location.href = '02-chat-interface.html?prompt=' + encodeURIComponent(p.dataset.text); }); });
                carousel.appendChild(slide);
                const dot = document.createElement('div'); dot.className = 'dot' + (i === 0 ? ' dot--active' : ''); dots.appendChild(dot);
            });

            // Scroll to active mode
            const activeIdx = MODES.findIndex(m => m.key === currentMode);
            if (activeIdx > 0) setTimeout(() => { carousel.scrollLeft = activeIdx * carousel.offsetWidth; }, 100);

            carousel.addEventListener('scroll', () => {
                const idx = Math.round(carousel.scrollLeft / carousel.offsetWidth);
                dots.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('dot--active', i === idx));
            });
        })();
    </script>
</body>

</html>
